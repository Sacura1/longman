<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dispatch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=IBM+Plex+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="masthead">
        <div class="masthead-meta">
            <span id="current-date">—</span>
            <span class="masthead-tagline">Independent Voices. Unfiltered.</span>
            <button class="new-post-btn" id="openModal">+ New Post</button>
        </div>
        <div class="masthead-title-wrap">
            <h1 class="masthead-title">THE FOOLANDROAND</h1>
        </div>
        <div class="masthead-rule"></div>
        <div class="masthead-sub">
            <span>Est. 2024</span>
            <span id="postCount">0 Posts Published</span>
        </div>
    </header>

    <main class="posts-section">
        <div class="section-header">
            <span class="section-label">Latest Dispatches</span>
        </div>
        <div class="posts-grid" id="postsGrid"></div>
        <div class="empty-state" id="emptyState">
            <p class="empty-icon">◈</p>
            <p class="empty-text">No dispatches yet.</p>
            <p class="empty-sub">Be the first to publish something worth reading.</p>
            <button class="empty-cta" id="openModalEmpty">Write the First Post →</button>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <span>THE DISPATCH</span>
            <span>All opinions are your own</span>
        </div>
    </footer>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-label">COMPOSE</span>
                <button class="modal-close" id="closeModal">✕</button>
            </div>
            <form id="postForm">
                <div class="form-group">
                    <label class="form-label">Headline</label>
                    <input type="text" id="postTitle" class="form-input" placeholder="What happened?" required maxlength="120">
                </div>
                <div class="form-group">
                    <label class="form-label">Byline</label>
                    <input type="text" id="postAuthor" class="form-input" placeholder="Your name" required maxlength="60">
                </div>
                <div class="form-group">
                    <label class="form-label">Body</label>
                    <textarea id="postContent" class="form-textarea" placeholder="Tell the story..." required maxlength="1000"></textarea>
                    <span class="char-count" id="charCount">0 / 1000</span>
                </div>
                <button type="submit" class="submit-btn">PUBLISH →</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
